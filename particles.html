const FG_HEX = '#f79320';
const PSIZE  = 0.03;
const RADIUS = 0.8;
const FORCE  = 0.1;
const Z_MIN  = 0;
const Z_MAX  = 0;
const SPRING = 0.05;
const DAMPING= 0.82;

const count     = RAW.length / 3;
const origPos   = new Float32Array(RAW);
const positions = new Float32Array(RAW);
const velocities = new Float32Array(count * 3);

function hexToRgb(h){return{r:parseInt(h.slice(1,3),16)/255,g:parseInt(h.slice(3,5),16)/255,b:parseInt(h.slice(5,7),16)/255};}
const fg = hexToRgb(FG_HEX);
const pColors = new Float32Array(count * 3);
for(let i=0;i<count;i++){pColors[i*3]=fg.r;pColors[i*3+1]=fg.g;pColors[i*3+2]=fg.b;}

const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.setClearColor(0xf7f7f7);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.01,100);
camera.position.z = 5.6;

const geometry = new THREE.BufferGeometry();
const posAttr  = new THREE.BufferAttribute(positions,3);
posAttr.setUsage(THREE.DynamicDrawUsage);
geometry.setAttribute('position',posAttr);
geometry.setAttribute('color',new THREE.BufferAttribute(pColors,3));

const material = new THREE.ShaderMaterial({
  uniforms:{uSize:{value:PSIZE},uZMin:{value:Z_MIN},uZMax:{value:Z_MAX},uViewH:{value:innerHeight}},
  vertexShader:`
    attribute vec3 color;
    varying vec3 vColor;
    varying float vAlpha;
    uniform float uSize,uZMin,uZMax,uViewH;
    void main(){
      vColor=color;
      float range=uZMax-uZMin;
      float t=(range>0.001)?clamp((position.z-uZMin)/range,0.0,1.0):1.0;
      vAlpha=t*t;
      vec4 mv=modelViewMatrix*vec4(position,1.0);
      gl_Position=projectionMatrix*mv;
      gl_PointSize=uSize*(uViewH*0.5)/-mv.z;
    }
  `,
  fragmentShader:`
    varying vec3 vColor;
    varying float vAlpha;
    void main(){
      vec2 uv=gl_PointCoord*2.0-1.0;
      if(dot(uv,uv)>1.0)discard;
      gl_FragColor=vec4(vColor,vAlpha);
    }
  `,
  transparent:true,depthWrite:false
});
scene.add(new THREE.Points(geometry,material));

const mouse = new THREE.Vector3(9999,9999,0);
canvas.addEventListener('mousemove',e=>{
  const nx=(e.clientX/innerWidth)*2-1, ny=-(e.clientY/innerHeight)*2+1;
  const v=new THREE.Vector3(nx,ny,0.5).unproject(camera);
  const d=v.sub(camera.position).normalize();
  const t=-camera.position.z/d.z;
  mouse.copy(camera.position).addScaledVector(d,t);
});

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  material.uniforms.uViewH.value=innerHeight;
});

(function animate(){
  requestAnimationFrame(animate);
  const pos=geometry.attributes.position.array;
  const mx=mouse.x,my=mouse.y;
  for(let i=0;i<count;i++){
    const ix=i*3,iy=i*3+1,iz=i*3+2;
    const dx=pos[ix]-mx,dy=pos[iy]-my;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<RADIUS&&dist>0.001){
      const f=(1-dist/RADIUS)*FORCE;
      velocities[ix]+=(dx/dist)*f;
      velocities[iy]+=(dy/dist)*f;
      velocities[iz]+=(Math.random()-0.5)*f*0.5;
    }
    velocities[ix]+=(origPos[ix]-pos[ix])*SPRING;
    velocities[iy]+=(origPos[iy]-pos[iy])*SPRING;
    velocities[iz]+=(origPos[iz]-pos[iz])*SPRING;
    velocities[ix]*=DAMPING;velocities[iy]*=DAMPING;velocities[iz]*=DAMPING;
    pos[ix]+=velocities[ix];pos[iy]+=velocities[iy];pos[iz]+=velocities[iz];
  }
  geometry.attributes.position.needsUpdate=true;
  renderer.render(scene,camera);
})();
</script>
