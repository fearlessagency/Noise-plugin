<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World ID — Welcome back</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: #fff;
    }

    /* ── Left panel — design reference as JPEG ──────── */
    .left {
      width: 50%;
      position: relative;
      overflow: hidden;
      background: #fff;
    }

    .left img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    /* ── Right panel — interactive particles ─────────── */
    .right {
      width: 50%;
      position: relative;
      overflow: hidden;
      background: #f7f7f7;
    }

    .right iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div class="left">
    <img src="/login-left.jpg" alt="World ID login">
  </div>

  <div class="right">
    <iframe src="/particles.html" title="Interactive particle globe"></iframe>
  </div>

</body>
</html>
