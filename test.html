<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World ID — Welcome back</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: #fff;
    }

    /* ── Left panel ─────────────────────────────── */
    .left {
      width: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 0 10% 0 12%;
      position: relative;
      background: #fff;
    }

    .content { max-width: 340px; }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #6b7280;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    .btn-okta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 100px;
      padding: 13px 26px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
      letter-spacing: -0.01em;
    }
    .btn-okta:hover { opacity: 0.82; }

    .btn-okta svg { width: 18px; height: 18px; flex-shrink: 0; }

    .footer {
      position: absolute;
      bottom: 28px;
      left: 12%;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      color: #9ca3af;
    }
    .footer a { color: #9ca3af; text-decoration: underline; }
    .footer a:hover { color: #6b7280; }

    /* ── Right panel ─────────────────────────────── */
    .right {
      width: 50%;
      position: relative;
      overflow: hidden;
      background: #f7f7f7;
    }

    .right iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div class="left">
    <div class="content">
      <h1>Welcome back</h1>
      <p class="subtitle">Log in to World ID enterprise portal.</p>
      <a href="#" class="btn-okta">
        <!-- World / sun icon -->
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="3.5" fill="#fff"/>
          <line x1="12" y1="2"  x2="12" y2="5"  stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <line x1="12" y1="19" x2="12" y2="22" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <line x1="2"  y1="12" x2="5"  y2="12" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <line x1="19" y1="12" x2="22" y2="12" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <line x1="4.93" y1="4.93" x2="7.05" y2="7.05" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <line x1="16.95" y1="16.95" x2="19.07" y2="19.07" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <line x1="4.93" y1="19.07" x2="7.05" y2="16.95" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <line x1="16.95" y1="7.05" x2="19.07" y2="4.93" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Login with Okta
      </a>
    </div>

    <div class="footer">
      <span>Powered by</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9.5" stroke="#9ca3af" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="3" fill="#9ca3af"/>
      </svg>
      <span>world</span>
      <a href="#">Contact us</a>
    </div>
  </div>

  <div class="right">
    <iframe src="/particles.html" title="Interactive particle globe"></iframe>
  </div>

</body>
</html>
